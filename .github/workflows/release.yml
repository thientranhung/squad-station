name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Extract the section for this version (between ## vX.Y.Z and the next ## vX.Y.Z)
          NOTES=$(awk "/^## ${TAG//./\\.} /{found=1; next} /^## v[0-9]/{if(found) exit} found" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            echo "WARNING: No CHANGELOG entry found for ${TAG}, using tag message"
            NOTES="Release ${TAG}"
          fi
          # Write to file to preserve formatting
          echo "$NOTES" > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md

  build:
    name: Build ${{ matrix.asset_name }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            asset_name: squad-station-darwin-arm64
            use_cross: false

          - target: x86_64-apple-darwin
            os: macos-latest
            asset_name: squad-station-darwin-x86_64
            use_cross: false

          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            asset_name: squad-station-linux-x86_64
            use_cross: false

          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            asset_name: squad-station-linux-arm64
            use_cross: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Build
        env:
          SQLX_OFFLINE: "true"
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/squad-station ${{ matrix.asset_name }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
