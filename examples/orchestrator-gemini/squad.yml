    provider: claude-code
    role: worker
    model: sonnet
    description: Senior coder, coding, fixing bugs, operating according to the project SDD.

  - name: brainstorm
    provider: claude-code
    role: worker
    model: opus
    description: Technical Lead, planner, analysis, performs code reviews and technical solutions
